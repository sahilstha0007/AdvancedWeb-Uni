<h1>TechLaptop Store</h1>
<h2>JSON Data (XHR)</h2>
<button (click)="loadJSON()">Load JSON</button>

@for (laptop of laptopsJSON(); track laptop.id) {
  <div>{{ laptop.name }} - RM {{ laptop.price }}</div>
}

<h2>XML Data (XHR)</h2>
<button (click)="loadXML()">Load XML</button>

@for (laptop of laptopsXML(); track $index) {
  <div>{{ laptop.name }} - RM {{ laptop.price }}</div>
}

<h2>Place Order</h2>
<button (click)="placeOrder()">Place Order</button>
@if (orderMessage()) {
  <div>{{ orderMessage() }}</div>
}
